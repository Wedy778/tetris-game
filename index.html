<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XDJMC小游戏中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{
    background:#1f664e;
    color:#111;
    text-align:center;
    padding:60px 20px;
}
h1{
    font-size:42px;
    margin-bottom:40px;
    color:#ffffff;
    letter-spacing:2px;
}
.wrap{
    display:flex;
    flex-direction:column;
    gap:22px;
    align-items:center;
}
.game-box{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:18px;
    width:500px;
    max-width:100%;
}
/*6阶薄荷渐变，全部按钮文字统一深绿色#165743*/
.level1{background:linear-gradient(150deg,#f6fcf9,#e6f7f2);color:#165743;}
.level2{background:linear-gradient(150deg,#dcf4eb,#b6e8d5);color:#165743;}
.level3{background:linear-gradient(150deg,#bce9d8,#96e2cc);color:#165743;}
.level4{background:linear-gradient(150deg,#98e0ca,#72d0b2);color:#165743;}
.level5{background:linear-gradient(150deg,#69c9a9,#52bb95);color:#165743;}
.level6{background:linear-gradient(150deg,#48aa86,#389978);color:#165743;}

.game-btn{
    padding:18px 0;
    font-size:19px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    transition:all 0.25s ease;
    box-shadow:0 4px 12px rgba(0,80,50,0.25);
    display:block;
    text-decoration:none;
}
.bottom-row{
    display:flex;
    justify-content:center;
    gap:30px;
    width:500px;
    max-width:100%;
    margin-top:8px;
}
.btn-small{
    width:160px;
    padding:11px 0;
    font-size:15px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    transition:all 0.25s ease;
    box-shadow:0 4px 12px rgba(0,80,50,0.25);
    background:linear-gradient(150deg,#69c9a9,#52bb95);
    color:#165743;
}
.game-btn:hover,.btn-small:hover{
    transform:translateY(-3px);
    filter:brightness(1.06);
    box-shadow:0 6px 16px rgba(0,90,55,0.35);
}

/*弹窗遮罩淡入淡出*/
.modal-mask{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
    opacity:0;
    transition:opacity 0.25s ease;
}
.modal-mask.show{
    display:flex;
    opacity:1;
}
/*优化回弹：时长缩短，小幅回弹自然轻快，不夸张*/
@keyframes bounceIn{
    0% {transform: scale(0.93); opacity:0;}
    65% {transform: scale(1.06); opacity:1;}
    100% {transform: scale(1);}
}
@keyframes bounceOut{
    0% {transform: scale(1);opacity:1;}
    100% {transform: scale(0.93);opacity:0;}
}
.modal-box{
    background:linear-gradient(150deg,#e6f7f2,#b6e8d5);
    color:#165743;
    padding:32px 42px;
    border-radius:14px;
    box-shadow:0 5px 20px #20594877;
}
.modal-mask.show .modal-box{
    animation: bounceIn 0.32s ease forwards;
}
.modal-mask.hide .modal-box{
    animation: bounceOut 0.18s ease forwards;
}
.modal-box h3{margin-bottom:16px;font-size:22px;}
.modal-box button{
    margin-top:10px;
    padding:8px 24px;
    border:none;
    border-radius:8px;
    background:linear-gradient(150deg,#69c9a9,#52bb95);
    color:#165743;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}
.modal-box button:hover{
    filter:brightness(1.1);
}
</style>
</head>
<body>
<h1>XDJMC</h1>
<div class="wrap">
    <div class="game-box">
        <a href="./tetris/" class="game-btn level1">俄罗斯方块</a>
        <a href="./mine/" class="game-btn level1">扫雷</a>
        <!-- 修改了这一行：把span改成a标签，添加href，移除develop类 -->
        <a href="./snake/" class="game-btn level2">贪吃蛇</a>
        <span class="game-btn level2 develop">2048</span>
        <span class="game-btn level3 develop">五子棋</span>
        <span class="game-btn level3 develop">消消乐</span>
        <span class="game-btn level4 develop">跳一跳</span>
        <span class="game-btn level4 develop">飞机大战</span>
        <span class="game-btn level5 develop">井字棋</span>
        <span class="game-btn level5 develop">国际象棋</span>
    </div>

    <div class="bottom-row">
        <button class="btn-small" id="colorSetBtn">设置</button>
        <button class="btn-small" id="devBtn">开发者</button>
    </div>
</div>

<!--共用同一个薄荷弹窗-->
<div class="modal-mask" id="modal">
    <div class="modal-box">
        <h3 id="modalTitle">游戏正在开发中</h3>
        <p id="modalText">敬请期待后续上线！</p>
        <button id="closeModal">关闭</button>
    </div>
</div>

<script>
const modal = document.getElementById('modal');
const closeModal = document.getElementById('closeModal');
const modalTitle = document.getElementById('modalTitle');
const modalText = document.getElementById('modalText');
const devBtns = document.querySelectorAll('.develop');
const colorSetBtn = document.getElementById("colorSetBtn");
const devBtn = document.getElementById("devBtn");

//打开弹窗通用方法
function openModal(title,text){
    modalTitle.innerText = title;
    modalText.innerText = text;
    modal.classList.remove('hide');
    modal.classList.add('show');
}
//关闭弹窗
function closeWin(){
    modal.classList.remove('show');
    modal.classList.add('hide');
    setTimeout(()=>{
        modal.classList.remove('hide');
    },180)
}

//未开发游戏弹窗
devBtns.forEach(item=>{
    item.onclick = ()=> openModal("游戏正在开发中","敬请期待后续上线！");
})
//开发者弹窗：此网站由Wedy制作
devBtn.onclick = ()=> openModal("开发者信息","此网站由Wedy制作");
//设置按钮
colorSetBtn.onclick = function(){
    openModal("设置功能","设置功能正在开发完善中");
}

closeModal.onclick = closeWin;
modal.onclick = (e)=>{
    if(e.target === modal) closeWin();
}
</script>
</body>
</html>
