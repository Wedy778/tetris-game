<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>俄罗斯方块</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#222;display:flex;justify-content:center;padding:30px;color:#fff}
#box{display:flex;gap:24px;align-items:flex-start}
#gameCanvas{border:2px solid #eee;background:#111}
#panel{}
.info{margin:14px 0;font-size:17px}
#nextCanvas{border:1px solid #666;background:#111}
.tip{margin-top:16px;font-size:14px;opacity:0.8}
#restartBtn{margin-top:20px;padding:8px 16px;font-size:15px;cursor:pointer}
</style>
</head>
<body>
<div id="box">
    <canvas id="gameCanvas" width="240" height="480"></canvas>
    <div id="panel">
        <div class="info">得分：<span id="score">0</span></div>
        <div class="info">消行：<span id="lines">0</span></div>
        <div class="info">下一个</div>
        <canvas id="nextCanvas" width="120" height="120"></canvas>
        <div class="tip">←→左右｜↑旋转｜↓快速下落</div>
        <button id="restartBtn">重新开始游戏</button>
    </div>
</div>
<script>
const game = document.getElementById('gameCanvas').getContext('2d');
const nextCtx = document.getElementById('nextCanvas').getContext('2d');
const scoreText = document.getElementById('score');
const lineText = document.getElementById('lines');
const restartBtn = document.getElementById('restartBtn');

const cell = 30;
const cols = 8;
const rows = 16;
const colors = [
    "#111",
    "#0cf","#c0c","#ff0","#0d0","#f90","#26f","#f44"
];

//七种方块
const shapes = [
    [[0,0],[1,0],[0,1],[1,1]],    //O
    [[0,1],[1,1],[2,1],[3,1]],    //I
    [[1,0],[0,1],[1,1],[2,1]],    //T
    [[0,0],[0,1],[1,1],[2,1]],    //L
    [[2,0],[0,1],[1,1],[2,1]],    //反L
    [[1,0],[2,0],[0,1],[1,1]],    //Z
    [[0,0],[1,0],[1,1],[2,1]]     //反Z
];

let map, score, totalLine, dropTimer, gameOver;
let now = {};
let nextIdx;

//初始化整局数据
function initGame(){
    if(dropTimer) clearInterval(dropTimer);
    map = Array(rows).fill().map(()=>Array(cols).fill(0));
    score = 0;
    totalLine = 0;
    gameOver = false;
    scoreText.innerText = score;
    lineText.innerText = totalLine;
    now = {
        shapeIdx: Math.floor(Math.random()*7),
        x:3,
        y:0
    };
    nextIdx = Math.floor(Math.random()*7);
    renderNext();
    renderGame();
    dropTimer = setInterval(dropOnce,750);
}

//碰撞检测
function isHit(sIndex, px, py){
    const s = shapes[sIndex];
    for(let [dx,dy] of s){
        let x = px + dx;
        let y = py + dy;
        if(x<0 || x>=cols) return true;
        if(y>=rows) return true;
        if(y>=0 && map[y][x]>0) return true;
    }
    return false;
}

//绘制主面板
function renderGame(){
    game.fillStyle="#111";
    game.fillRect(0,0,240,480);
    //地图格子
    for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
            let c = map[y][x];
            game.fillStyle=colors[c];
            game.fillRect(x*cell+1,y*cell+1,cell-2,cell-2);
        }
    }
    if(gameOver) return;
    //当前方块
    const s=shapes[now.shapeIdx];
    const colorId = now.shapeIdx+1;
    game.fillStyle=colors[colorId];
    for(let [dx,dy] of s){
        let x = now.x+dx;
        let y = now.y+dy;
        game.fillRect(x*cell+1,y*cell+1,cell-2,cell-2);
    }
}

//预览下一个
function renderNext(){
    nextCtx.fillStyle="#111";
    nextCtx.fillRect(0,0,120,120);
    const s=shapes[nextIdx];
    const colorId = nextIdx+1;
    nextCtx.fillStyle=colors[colorId];
    let offX=1,offY=1;
    for(let [dx,dy] of s){
        nextCtx.fillRect((offX+dx)*30+1,(offY+dy)*30+1,28,28);
    }
}

//方块落地写入地图
function lockBlock(){
    const s=shapes[now.shapeIdx];
    const cid = now.shapeIdx+1;
    for(let [dx,dy] of s){
        let x=now.x+dx;
        let y=now.y+dy;
        if(y>=0) map[y][x]=cid;
    }
    clearLine();

    //生成新方块
    now={
        shapeIdx:nextIdx,
        x:3,
        y:0
    }
    nextIdx = Math.floor(Math.random()*7);
    renderNext();

    //【修复：新方块生成即碰撞=直接游戏结束】
    if(isHit(now.shapeIdx,now.x,now.y)){
        gameOver = true;
        clearInterval(dropTimer);
        alert("游戏结束！最终得分："+score+"\n点击重新开始按钮再来一局");
    }
}

//消行计分
function clearLine(){
    let clearNum=0;
    for(let y=rows-1;y>=0;y--){
        if(map[y].every(v=>v>0)){
            map.splice(y,1);
            map.unshift(Array(cols).fill(0));
            clearNum++;
            y++;
        }
    }
    if(clearNum>0){
        totalLine+=clearNum;
        score += clearNum*100;
        scoreText.innerText=score;
        lineText.innerText=totalLine;
    }
}

//自动下落
function dropOnce(){
    if(gameOver) return;
    if(!isHit(now.shapeIdx,now.x,now.y+1)){
        now.y +=1;
    }else{
        lockBlock();
    }
    renderGame();
}

//旋转
function rotate(){
    if(gameOver) return;
    const old = JSON.parse(JSON.stringify(shapes[now.shapeIdx]));
    let newP = old.map(([x,y])=>[-y,x]);
    shapes[now.shapeIdx]=newP;
    if(isHit(now.shapeIdx,now.x,now.y)){
        shapes[now.shapeIdx]=old;
        if(!isHit(now.shapeIdx,now.x-1,now.y)) now.x--;
        else if(!isHit(now.shapeIdx,now.x+1,now.y)) now.x++;
    }
    renderGame();
}

//键盘操控
document.addEventListener("keydown",e=>{
    if(gameOver) return;
    switch(e.key){
        case "ArrowLeft":
            if(!isHit(now.shapeIdx,now.x-1,now.y)) now.x--;break;
        case "ArrowRight":
            if(!isHit(now.shapeIdx,now.x+1,now.y)) now.x++;break;
        case "ArrowDown":dropOnce();break;
        case "ArrowUp":rotate();break;
    }
    renderGame();
})

//重新开始按钮绑定
restartBtn.onclick = initGame;

//首次启动
initGame();
</script>
</body>
</html>
