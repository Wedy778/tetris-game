<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
<title>俄罗斯方块</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{transition: background 0.3s,color 0.3s;display:flex;flex-direction:column;align-items:center;padding:20px}
body.dark{background:#222;color:#fff}
body.light{background:#f5f5f5;color:#222}
#box{display:flex;gap:24px;align-items:flex-start;margin-bottom:15px}
#gameCanvas{border:2px solid #eee;background:#111;transition:background 0.3s}
.light #gameCanvas{background:#efefef;border-color:#999}
#panel{}
.info{margin:12px 0;font-size:17px}
#nextCanvas{border:1px solid #666;background:#111;transition:background 0.3s}
.light #nextCanvas{background:#e9e9e9}
.tip{margin-top:12px;font-size:14px;opacity:0.8}
.ctrl-row{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.ctrl-row button,.ctrl-row select{padding:6px 10px;cursor:pointer}
#restartBtn{padding:7px 14px;font-size:15px}
/*虚拟按键*/
#touchBtnBox{margin-top:15px;display:grid;grid-template-columns:80px 80px 80px;gap:10px}
.touchBtn{width:80px;height:60px;font-size:22px;background:#444;color:#fff;border:1px solid #888;border-radius:6px;cursor:pointer}
.light .touchBtn{background:#ddd;color:#111;border:#999}
.touchBtn:active{opacity:0.7}
#btnLeft{grid-column:1}
#btnDown{grid-column:2}
#btnRight{grid-column:3}
#btnRotate{grid-column:2;grid-row:2}
</style>
</head>
<body class="dark">
<div class="ctrl-row">
    <button id="themeModeBtn">切换浅色/深色</button>
    <select id="colorSetSel">
        <option value="0">①经典霓虹(原版)</option>
        <option value="1">②马卡龙柔和</option>
        <option value="2">③复古像素</option>
        <option value="3">④暗黑金属</option>
    </select>
</div>

<div id="box">
    <canvas id="gameCanvas" width="240" height="480"></canvas>
    <div id="panel">
        <div class="info">得分：<span id="score">0</span></div>
        <div class="info">消行：<span id="lines">0</span></div>
        <div class="info">下一个</div>
        <canvas id="nextCanvas" width="120" height="120"></canvas>
        <div class="tip">←→左右｜↑旋转｜↓下落</div>
        <button id="restartBtn">重新开始游戏</button>
    </div>
</div>

<div id="touchBtnBox">
    <button class="touchBtn" id="btnLeft">←</button>
    <button class="touchBtn" id="btnDown">↓</button>
    <button class="touchBtn" id="btnRight">→</button>
    <button class="touchBtn" id="btnRotate">旋转</button>
</div>

<script>
const game = document.getElementById('gameCanvas').getContext('2d');
const nextCtx = document.getElementById('nextCanvas').getContext('2d');
const scoreText = document.getElementById('score');
const lineText = document.getElementById('lines');
const restartBtn = document.getElementById('restartBtn');
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
const btnDown = document.getElementById('btnDown');
const btnRotate = document.getElementById('btnRotate');
const modeBtn = document.getElementById('themeModeBtn');
const colorSel = document.getElementById('colorSetSel');
const body = document.body;

const cell = 30;
const cols = 8;
const rows = 16;

//4套配色方案
const colorSets = [
    ["#111","#0cf","#c0c","#ff0","#0d0","#f90","#26f","#f44"], //经典霓虹
    ["#ececec","#87CEFA","#FFB6C1","#FFE495","#90EE90","#FFCC99","#99ccff","#ff9999"],//马卡龙
    ["#222","#38b9b9","#b95eb9","#d4c850","#56b856","#d68c45","#3568b9","#c94b4b"],//复古像素
    ["#191919","#3a5f63","#5c3e5c","#726c3e","#3b6b3b","#755738","#2d4366","#703838"] //暗黑金属
];
let nowColorIdx = 0;
let colors = [...colorSets[nowColorIdx]];

//方块形状
const shapes = [
    [[0,0],[1,0],[0,1],[1,1]],    //O
    [[0,1],[1,1],[2,1],[3,1]],    //I
    [[1,0],[0,1],[1,1],[2,1]],    //T
    [[0,0],[0,1],[1,1],[2,1]],    //L
    [[2,0],[0,1],[1,1],[2,1]],    //反L
    [[1,0],[2,0],[0,1],[1,1]],    //Z
    [[0,0],[1,0],[1,1],[2,1]]     //反Z
];

let map, score, totalLine, dropTimer, gameOver;
let now = {};
let nextIdx;

//初始化
function initGame(){
    if(dropTimer) clearInterval(dropTimer);
    map = Array(rows).fill().map(()=>Array(cols).fill(0));
    score = 0;
    totalLine = 0;
    gameOver = false;
    scoreText.innerText = score;
    lineText.innerText = totalLine;
    now = {
        shapeIdx: Math.floor(Math.random()*7),
        x:3,
        y:0
    };
    nextIdx = Math.floor(Math.random()*7);
    renderNext();
    renderGame();
    dropTimer = setInterval(dropOnce,750);
}

//碰撞检测
function isHit(sIndex, px, py){
    const s = shapes[sIndex];
    for(let [dx,dy] of s){
        let x = px + dx;
        let y = py + dy;
        if(x<0 || x>=cols) return true;
        if(y>=rows) return true;
        if(y>=0 && map[y][x]>0) return true;
    }
    return false;
}

//绘制主画布
function renderGame(){
    const bg = body.classList.contains('dark') ? "#111":"#efefef";
    game.fillStyle=bg;
    game.fillRect(0,0,240,480);
    for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
            let c = map[y][x];
            game.fillStyle=colors[c];
            game.fillRect(x*cell+1,y*cell+1,cell-2,cell-2);
        }
    }
    if(gameOver) return;
    const s=shapes[now.shapeIdx];
    const colorId = now.shapeIdx+1;
    game.fillStyle=colors[colorId];
    for(let [dx,dy] of s){
        let x = now.x+dx;
        let y = now.y+dy;
        game.fillRect(x*cell+1,y*cell+1,cell-2,cell-2);
    }
}

//预览方块
function renderNext(){
    const bg = body.classList.contains('dark') ? "#111":"#e9e9e9";
    nextCtx.fillStyle=bg;
    nextCtx.fillRect(0,0,120,120);
    const s=shapes[nextIdx];
    const colorId = nextIdx+1;
    nextCtx.fillStyle=colors[colorId];
    let offX=1,offY=1;
    for(let [dx,dy] of s){
        nextCtx.fillRect((offX+dx)*30+1,(offY+dy)*30+1,28,28);
    }
}

//落地固化
function lockBlock(){
    const s=shapes[now.shapeIdx];
    const cid = now.shapeIdx+1;
    for(let [dx,dy] of s){
        let x=now.x+dx;
        let y=now.y+dy;
        if(y>=0) map[y][x]=cid;
    }
    clearLine();
    now={shapeIdx:nextIdx,x:3,y:0};
    nextIdx = Math.floor(Math.random()*7);
    renderNext();
    if(isHit(now.shapeIdx,now.x,now.y)){
        gameOver = true;
        clearInterval(dropTimer);
        alert("游戏结束！得分："+score+"\n点击重新开始");
    }
}

//消行
function clearLine(){
    let clearNum=0;
    for(let y=rows-1;y>=0;y--){
        if(map[y].every(v=>v>0)){
            map.splice(y,1);
            map.unshift(Array(cols).fill(0));
            clearNum++;
            y++;
        }
    }
    if(clearNum>0){
        totalLine+=clearNum;
        score += clearNum*100;
        scoreText.innerText=score;
        lineText.innerText=totalLine;
    }
}

//自动下落
function dropOnce(){
    if(gameOver) return;
    if(!isHit(now.shapeIdx,now.x,now.y+1)) now.y +=1;
    else lockBlock();
    renderGame();
}

//旋转逻辑（修复贴边卡死）
function rotate(){
    if(gameOver) return;
    const old = JSON.parse(JSON.stringify(shapes[now.shapeIdx]));
    let newP = old.map(([x,y])=>[-y,x]);
    shapes[now.shapeIdx]=newP;
    if(isHit(now.shapeIdx,now.x,now.y)){
        shapes[now.shapeIdx]=old;
        if(!isHit(now.shapeIdx,now.x-1,now.y)) now.x--;
        else if(!isHit(now.shapeIdx,now.x+1,now.y)) now.x++;
    }
    renderGame();
}

//键盘
document.addEventListener("keydown",e=>{
    if(gameOver) return;
    switch(e.key){
        case "ArrowLeft":if(!isHit(now.shapeIdx,now.x-1,now.y)) now.x--;break;
        case "ArrowRight":if(!isHit(now.shapeIdx,now.x+1,now.y)) now.x++;break;
        case "ArrowDown":dropOnce();break;
        case "ArrowUp":rotate();break;
    }
    renderGame();
})

//触屏按钮
btnLeft.onclick = ()=>{
    if(gameOver)return;
    if(!isHit(now.shapeIdx,now.x-1,now.y)) now.x--;renderGame();
}
btnRight.onclick = ()=>{
    if(gameOver)return;
    if(!isHit(now.shapeIdx,now.x+1,now.y)) now.x++;renderGame();
}
btnDown.onclick = ()=>{if(gameOver)return;dropOnce();}
btnRotate.onclick = ()=>{if(gameOver)return;rotate();}

//深色浅色切换
modeBtn.onclick = ()=>{
    body.classList.toggle('dark');
    body.classList.toggle('light');
    renderGame();renderNext();
}

//配色切换
colorSel.onchange = ()=>{
    nowColorIdx = Number(colorSel.value);
    colors = [...colorSets[nowColorIdx]];
    renderGame();renderNext();
}

restartBtn.onclick = initGame;
initGame();
</script>
</body>
</html>
