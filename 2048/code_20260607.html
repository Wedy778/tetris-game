<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
<title>2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#1f664e;display:flex;flex-direction:column;align-items:center;padding:20px;position:relative}
/*右上角返回首页房子按钮*/
.home-icon{
    position:absolute;
    top:16px;
    right:20px;
    width:46px;height:46px;border-radius:50%;
    background:linear-gradient(150deg,#69c9a9,#52bb95);
    display:flex;align-items:center;justify-content:center;
    text-decoration:none;font-size:24px;color:#165743;
    box-shadow:0 3px 10px #20594860;
}
.ctrl-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.ctrl-row button,.ctrl-row select{
    padding:10px 16px;font-size:16px;border:none;border-radius:10px;
    background:linear-gradient(150deg,#69c9a9,#52bb95);color:#165743;cursor:pointer;
}
/*游戏操作说明*/
.game-tip{
    color:#e6f7f2;
    font-size:14px;
    opacity:0.8;
    margin-bottom:16px;
    text-align:center;
    line-height:1.5;
}
.score-info{
    color:#e6f7f2;
    font-size:20px;
    margin-bottom:16px;
}
#gameBoard{
    display:grid;
    gap:8px;
    background:#277860;
    padding:10px;
    border-radius:12px;
    box-shadow:0 0 25px #38997870;
    touch-action: none;
}
.cell{
    width:60px;height:60px;
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-weight:bold;font-size:22px;color:#165743;
    user-select:none;
    /* 先快后慢的自然动画，时长0.12秒不拖沓 */
    transition: all 0.12s cubic-bezier(0.2, 0.8, 0.2, 1);
}
/* 合并时的弹出动画，同样先快后慢 */
.cell.merge{
    animation: mergePop 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes mergePop{
    0% {transform: scale(1);}
    50% {transform: scale(1.12);}
    100% {transform: scale(1);}
}
/*虚拟方向按键（和其他游戏同款）*/
.dir-box{
    margin-top:20px;
    display:grid;
    grid-template-columns: repeat(3,70px);
    gap:8px;
}
.dir-btn{
    width:70px;
    height:70px;
    border:none;
    border-radius:10px;
    background:linear-gradient(150deg,#b6e8d5,#72d0b2);
    color:#165743;
    font-size:22px;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
}
.dir-btn:active{filter:brightness(0.9)}
.dir-empty{visibility:hidden;}

/*和主页统一的薄荷弹窗*/
.modal-mask{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
    opacity:0;
    transition:opacity 0.25s ease;
}
.modal-mask.show{
    display:flex;
    opacity:1;
}
@keyframes bounceIn{
    0% {transform: scale(0.93); opacity:0;}
    65% {transform: scale(1.06); opacity:1;}
    100% {transform: scale(1);}
}
@keyframes bounceOut{
    0% {transform: scale(1);opacity:1;}
    100% {transform: scale(0.93);opacity:0;}
}
.modal-box{
    background:linear-gradient(150deg,#e6f7f2,#b6e8d5);
    color:#165743;
    padding:32px 42px;
    border-radius:14px;
    box-shadow:0 5px 20px #20594877;
    text-align:center;
}
.modal-mask.show .modal-box{
    animation: bounceIn 0.32s ease forwards;
}
.modal-mask.hide .modal-box{
    animation: bounceOut 0.18s ease forwards;
}
.modal-box h3{margin-bottom:16px;font-size:22px;}
.modal-btn-group{display:flex;gap:14px;justify-content:center;margin-top:20px;}
.modal-box button{
    padding:8px 24px;
    border:none;
    border-radius:8px;
    background:linear-gradient(150deg,#69c9a9,#52bb95);
    color:#165743;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}
.modal-box button:hover{
    filter:brightness(1.1);
}
</style>
</head>
<body>
<a href="../" class="home-icon">🏠</a>

<div class="ctrl-row">
    <button id="restartBtn">重新开始</button>
    <button id="pauseBtn">暂停</button>
    <select id="difficultySel">
        <option value="easy">初级 (3×3)</option>
        <option value="medium" selected>中级 (4×4)</option>
        <option value="hard">高级 (5×5)</option>
    </select>
</div>

<!-- 游戏操作说明 -->
<div class="game-tip">
    合并相同数字，合成2048获胜<br>
    电脑：方向键 | 手机：点击下方按键
</div>

<div class="score-info">得分：<span id="score">0</span></div>

<div id="gameBoard"></div>

<!-- 手机虚拟方向按键 -->
<div class="dir-box">
    <div class="dir-empty"></div>
    <button class="dir-btn" data-dir="up">↑</button>
    <div class="dir-empty"></div>
    <button class="dir-btn" data-dir="left">←</button>
    <button class="dir-btn" data-dir="down">↓</button>
    <button class="dir-btn" data-dir="right">→</button>
</div>

<div class="modal-mask" id="modal">
    <div class="modal-box">
        <h3 id="modalTitle">游戏结束</h3>
        <p id="modalText">最终得分：0</p>
        <div class="modal-btn-group">
            <button id="modalRestart">重新开始</button>
            <button id="modalHome">返回主页</button>
        </div>
    </div>
</div>

<script>
const gameBoard = document.getElementById('gameBoard');
const scoreText = document.getElementById('score');
const restartBtn = document.getElementById('restartBtn');
const pauseBtn = document.getElementById('pauseBtn');
const difficultySel = document.getElementById('difficultySel');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalText = document.getElementById('modalText');
const modalRestart = document.getElementById('modalRestart');
const modalHome = document.getElementById('modalHome');
const dirBtns = document.querySelectorAll('.dir-btn');

//难度配置（格子大小）
const difficulty = {
    easy: 3,
    medium: 4,
    hard: 5
};
let gridSize = difficulty.medium;
let board = [];
let score = 0;
let gameOver = false;
let isPause = false;
let isAnimating = false;

//【完全按照你的要求：2纯白→4浅薄荷→2048最深薄荷绿】
const cellColors = {
    0: '#3ea98b',    // 空格子
    2: '#ffffff',    // 最浅 纯白
    4: '#f0f9f6',    // 极浅薄荷
    8: '#e0f3ed',
    16: '#d0ede4',
    32: '#c0e7db',
    64: '#b0e1d2',
    128: '#a0dbc9',
    256: '#90d5c0',
    512: '#80cfb7',
    1024: '#70c9ae',
    2048: '#389978', // 最深 薄荷绿
    4096: '#277860',
    8192: '#1f664e'
};

//弹窗控制
function showModal(title,text){
    modalTitle.innerText = title;
    modalText.innerText = text;
    modal.classList.remove('hide');
    modal.classList.add('show');
}
function hideModal(){
    modal.classList.remove('show');
    modal.classList.add('hide');
    setTimeout(()=>modal.classList.remove('hide'),180)
}
modalRestart.onclick = ()=>{
    hideModal();
    initGame();
}
modalHome.onclick = ()=>{
    location.href = "../";
}

//初始化游戏
function initGame(){
    gameOver = false;
    isPause = false;
    isAnimating = false;
    score = 0;
    scoreText.innerText = score;
    pauseBtn.innerText = "暂停";
    
    //初始化棋盘
    board = Array(gridSize).fill().map(()=>Array(gridSize).fill(0));
    gameBoard.innerHTML = '';
    gameBoard.style.gridTemplateColumns = `repeat(${gridSize}, 60px)`;
    
    //生成格子DOM
    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.r = r;
            cell.dataset.c = c;
            gameBoard.appendChild(cell);
        }
    }
    
    //生成两个初始数字
    generateRandom();
    generateRandom();
    
    //绘制棋盘
    draw();
}

//生成随机数字（2或4）
function generateRandom(){
    let emptyCells = [];
    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            if(board[r][c] === 0) emptyCells.push({r,c});
        }
    }
    if(emptyCells.length === 0) return false;
    
    const randomCell = emptyCells[Math.floor(Math.random()*emptyCells.length)];
    board[randomCell.r][randomCell.c] = Math.random() < 0.9 ? 2 : 4;
    return true;
}

//绘制棋盘
function draw(){
    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
            const value = board[r][c];
            cell.innerText = value === 0 ? '' : value;
            cell.style.backgroundColor = cellColors[value] || cellColors[2048];
            
            //大数字调整字体大小
            if(value >= 1024){
                cell.style.fontSize = '18px';
            }else if(value >= 512){
                cell.style.fontSize = '20px';
            }else{
                cell.style.fontSize = '22px';
            }
        }
    }
}

//移动逻辑
function move(direction){
    if(gameOver || isPause || isAnimating) return;
    isAnimating = true;
    
    const oldBoard = JSON.parse(JSON.stringify(board));
    let moved = false;
    let mergePositions = [];
    
    switch(direction){
        case 'up': moved = moveUp(mergePositions); break;
        case 'down': moved = moveDown(mergePositions); break;
        case 'left': moved = moveLeft(mergePositions); break;
        case 'right': moved = moveRight(mergePositions); break;
    }
    
    if(moved){
        draw();
        // 添加合并动画
        mergePositions.forEach(pos => {
            const cell = document.querySelector(`[data-r="${pos.r}"][data-c="${pos.c}"]`);
            cell.classList.add('merge');
            setTimeout(()=>cell.classList.remove('merge'), 150);
        });
        
        setTimeout(()=>{
            generateRandom();
            draw();
            checkWin();
            checkGameOver();
            isAnimating = false;
        }, 120);
    }else{
        isAnimating = false;
    }
}

//向左移动
function moveLeft(mergePositions){
    let moved = false;
    for(let r=0;r<gridSize;r++){
        let row = board[r].filter(val => val !== 0);
        for(let i=0;i<row.length-1;i++){
            if(row[i] === row[i+1]){
                row[i] *= 2;
                score += row[i];
                row.splice(i+1,1);
                mergePositions.push({r, c:i});
            }
        }
        while(row.length < gridSize) row.push(0);
        for(let c=0;c<gridSize;c++){
            if(board[r][c] !== row[c]) moved = true;
            board[r][c] = row[c];
        }
    }
    scoreText.innerText = score;
    return moved;
}

//向右移动
function moveRight(mergePositions){
    let moved = false;
    for(let r=0;r<gridSize;r++){
        let row = board[r].filter(val => val !== 0);
        for(let i=row.length-1;i>0;i--){
            if(row[i] === row[i-1]){
                row[i] *= 2;
                score += row[i];
                row.splice(i-1,1);
                i--;
                mergePositions.push({r, c:gridSize - (row.length - i)});
            }
        }
        while(row.length < gridSize) row.unshift(0);
        for(let c=0;c<gridSize;c++){
            if(board[r][c] !== row[c]) moved = true;
            board[r][c] = row[c];
        }
    }
    scoreText.innerText = score;
    return moved;
}

//向上移动
function moveUp(mergePositions){
    let moved = false;
    for(let c=0;c<gridSize;c++){
        let col = [];
        for(let r=0;r<gridSize;r++){
            if(board[r][c] !== 0) col.push(board[r][c]);
        }
        for(let i=0;i<col.length-1;i++){
            if(col[i] === col[i+1]){
                col[i] *= 2;
                score += col[i];
                col.splice(i+1,1);
                mergePositions.push({r:i, c});
            }
        }
        while(col.length < gridSize) col.push(0);
        for(let r=0;r<gridSize;r++){
            if(board[r][c] !== col[r]) moved = true;
            board[r][c] = col[r];
        }
    }
    scoreText.innerText = score;
    return moved;
}

//向下移动
function moveDown(mergePositions){
    let moved = false;
    for(let c=0;c<gridSize;c++){
        let col = [];
        for(let r=0;r<gridSize;r++){
            if(board[r][c] !== 0) col.push(board[r][c]);
        }
        for(let i=col.length-1;i>0;i--){
            if(col[i] === col[i-1]){
                col[i] *= 2;
                score += col[i];
                col.splice(i-1,1);
                i--;
                mergePositions.push({r:gridSize - (col.length - i), c});
            }
        }
        while(col.length < gridSize) col.unshift(0);
        for(let r=0;r<gridSize;r++){
            if(board[r][c] !== col[r]) moved = true;
            board[r][c] = col[r];
        }
    }
    scoreText.innerText = score;
    return moved;
}

//检查胜利（合成2048）
function checkWin(){
    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            if(board[r][c] === 2048){
                gameOver = true;
                showModal("恭喜胜利！", "你合成了2048！\n最终得分：" + score);
                return;
            }
        }
    }
}

//检查游戏结束（无法移动）
function checkGameOver(){
    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            if(board[r][c] === 0) return;
        }
    }
    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            if(c < gridSize-1 && board[r][c] === board[r][c+1]) return;
            if(r < gridSize-1 && board[r][c] === board[r+1][c]) return;
        }
    }
    gameOver = true;
    showModal("游戏结束", "没有可移动的格子了\n最终得分：" + score);
}

//暂停功能
pauseBtn.onclick = ()=>{
    if(gameOver) return;
    isPause = !isPause;
    pauseBtn.innerText = isPause ? "继续" : "暂停";
}

//键盘控制
document.addEventListener('keydown', e=>{
    if(gameOver) return;
    switch(e.key){
        case 'ArrowUp': move('up'); break;
        case 'ArrowDown': move('down'); break;
        case 'ArrowLeft': move('left'); break;
        case 'ArrowRight': move('right'); break;
        case ' ': pauseBtn.click(); break;
    }
});

//手机虚拟按键控制
dirBtns.forEach(btn=>{
    btn.addEventListener('touchstart', e=>{
        e.preventDefault();
        if(gameOver) return;
        move(btn.dataset.dir);
    }, {passive: false});
});

//难度切换
difficultySel.onchange = ()=>{
    gridSize = difficulty[difficultySel.value];
    initGame();
}

restartBtn.onclick = initGame;
initGame();
</script>
</body>
</html>
